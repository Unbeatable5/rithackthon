<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CivicSense | Authority Access</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="veri.css">
  <link rel="stylesheet" href="neon-bg.css">
</head>

<body>
  <div class="neon-blur neon-blur-1"></div>
  <div class="neon-blur neon-blur-2"></div>
  <div class="neon-blur neon-blur-3"></div>

  <!-- Global Navbar -->
  <nav class="navbar">
    <div class="logo">CivicSense</div>
    <ul class="nav-links">
      <a href="index.html">Home</a>


  </nav>

  <!-- Main Container -->

  <main class="login-container">
    <div class="login-card">
      <div class="login-header">

        <h2>Authority Access</h2>
        <p>Department verification</p>
      </div>

      <!-- Login Form -->
      <form id="verifyForm" class="minimal-form">
        <div class="input-group">
          <span class="material-icons-outlined input-icon">badge</span>
          <input type="text" id="authId" placeholder="Authority ID " required>
        </div>

        <div class="input-group">
          <span class="material-icons-outlined input-icon">lock</span>
          <input type="password" id="password" placeholder="Secure Password" required>
        </div>

        <div class="input-group">
          <span class="material-icons-outlined input-icon">account_balance</span>
          <select id="department" required>
            <option value="" disabled selected>Select Department </option>
            <option value="water">Water & Drainage</option>
            <option value="road">Road & Infrastructure</option>
            <option value="electrical">Electricity</option>
            <option value="sanitation">Sanitation & Garbage</option>
            <option value="administration">Administration</option>
          </select>
        </div>

        <button type="submit" class="auth-btn">
          AUTHENTICATE

        </button>
      </form>

      <p id="msg" class="status-msg"></p>
    </div>
  </main>

  <!-- Global Footer -->

  <script src="api_client.js"></script>
  <script src="veri.js"></script>
  <script src="script.js"></script>
</body>

</html>
