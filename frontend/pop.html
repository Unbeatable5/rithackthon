<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complaint Submitted - CivicSense</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background:#f4f6fb;
}

/* NAVBAR */
.navbar {
    position: sticky;
    top: 0;
    z-index: 2000;

    display: flex;
    justify-content: space-between;
    align-items: center;
    
    height: 80px;
    background-color: #ffffff;
    padding: 10px 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.navbar a:hover {
    color: #489c4c;
   
}


#how-it-works {
    scroll-margin-top: 100px;
}
#track-complaints {
    scroll-margin-top: 100px;
}
.nav-links{
     display: flex;
    gap: 40px;
     position: sticky;
     top: 0;
      list-style: none;
}


    

.nav-links a {
    margin: 10px 0 0 0;
    font-size: 1.1rem;
    text-decoration: none;
    color: black;
    font-weight: normal;
    transition: 0.3s;
}
.logo {
    color: #0d5bed ;
    font-size:2rem;
    font-weight: bold;
    /* padding-bottom: ; */
}
.nav-bar{
    background-color: var(--secondary-green);
    margin: 5px 30px 0 0 ;
    height: 40px;
    color: var(--light-bg);
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 1rem;
    padding: 10px;
   
}
.nav-bar:hover{
      transform: scale(1.1);
}

.container{
display:flex;
justify-content:center;
align-items:center;
height:85vh;
}

/* CARD */

.card{
background:white;
padding:50px;
border-radius:14px;
box-shadow:0 15px 50px rgba(0,0,0,0.1);
text-align:center;
width:420px;
animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

.check{
font-size:75px;
color:#28a745;
margin-bottom:20px;
animation:pop 0.4s ease;
}

@keyframes pop{
0%{transform:scale(0.5);}
100%{transform:scale(1);}
}

.card h2{
margin-bottom:10px;
font-size:24px;
}

.card p{
color:#666;
margin-bottom:20px;
}

/* Complaint ID */

.complaint-id{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin:20px 0;
}

#complaintId{
color:#e74c3c;
font-weight:bold;
font-size:18px;
}

/* Copy Button */

.copy-btn{
padding:4px 12px;
border:none;
background:rgb(54, 54, 54);
color:white;
border-radius:6px;
cursor:pointer;
font-size:13px;
transition:0.3s;
}

.copy-btn:hover{
background:black;
}

/* Buttons */

.btn-group{
margin-top:25px;
display:flex;
justify-content:center;
gap:12px;
}

.btn{
padding:12px 20px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:14px;
transition:0.3s;
}

.home-btn{
background:#0d5bed;
color:white;
}

.home-btn:hover{
background:#0449c9;
}

.track-btn{
background:#27ab44;
color:white;
}

.track-btn:hover{
background:#218838;
}

/* Toast */

.toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#333;
color:white;
padding:10px 20px;
border-radius:6px;
opacity:0;
transition:0.3s;
}

.toast.show{
opacity:1;
}

</style>
</head>

<body>

<!-- NAVBAR -->

    <nav class="navbar">
        
            <ul class="nav-links">
                <div class="logo">CivicSense</div>
            <!-- <a href="#">Home</a> -->

            <!-- <a href="#how">How It Work</a> -->
              <!-- <a href="track.html">Track Complaints</a> -->
            </ul>
   </nav>
<!-- MAIN -->
<div class="container">

<div class="card">

<div class="check">✔</div>

<h2>Complaint Submitted</h2>

<p>Your complaint has been successfully submitted.</p>

<div class="complaint-id">
<span>Complaint ID:</span>
<span id="complaintId">568423501</span>
<button class="copy-btn" onclick="copyID()">Copy</button>
</div>

<div class="btn-group">
<button class="btn home-btn" onclick="goHome()">Home</button>
<button class="btn track-btn" onclick="goTrack()">Track</button>
</div>

</div>

</div>


<div id="toast" class="toast">Copied!</div>

<script>

function goHome(){
window.location.href="index.html";
}

function goTrack(){
window.location.href="track.html";
}

function copyID(){

let id=document.getElementById("complaintId").innerText;

navigator.clipboard.writeText(id);

let toast=document.getElementById("toast");

toast.innerText="Copied: "+id;
toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},2000);

}


</script>

</body>
</html>
